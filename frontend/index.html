<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作卡壳救援助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <span class="logo">✍️</span>
                <div class="brand-text">
                    <h1>Inkling</h1>
                    <p>AI 写作卡壳救援助手</p>
                </div>
            </div>
            <p class="header-link">
                <a href="enhanced-demo.html">🔮 增强功能演示 →</a>
            </p>
        </div>
        
        <!-- 配置面板 -->
        <div id="setupPanel" class="setup-panel">
            <h2>开始写作</h2>
            <p style="color: #666; margin-bottom: 20px; font-size: 14px;">
                输入作文题目，AI 会在你卡壳时给你引导
            </p>
            <input type="text" id="topicInput" placeholder="例如：那一刻，我长大了" value="那一刻，我长大了">
            <button onclick="startSession()">开始</button>
            <div id="setupError" class="error"></div>
        </div>
        
        <!-- 聊天界面 -->
        <div id="chatPanel" style="display: none;">
            <div class="status-bar">
                <span id="sessionInfo">题目: -</span>
                <span id="modeInfo">模式: 审题</span>
            </div>

            <!-- 写作进度面板 -->
            <div class="progress-panel" id="progressPanel" style="display: none;">
                <div class="progress-header">
                    <span>📊 写作进度</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="progress-meta" id="progressMeta">
                    <span>已写 0 字</span>
                    <span>结构: -</span>
                </div>
            </div>

            <div class="chat-area" id="chatArea">
                <div class="typing" id="typingIndicator">
                    🤖 AI 正在思考...
                </div>
            </div>
            
            <div class="suggestion-chips" id="suggestionChips">
                <span class="chip" onclick="sendQuick('开始写了')">开始写了</span>
                <span class="chip" onclick="sendQuick('还是不会')">还是不会</span>
                <span class="chip" onclick="sendQuick('还是不懂')">还是不懂</span>
                <span class="chip" onclick="sendQuick('正文写完了，不会结尾')">不会结尾</span>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="输入你想说的..." 
                       onkeypress="if(event.key==='Enter')sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
